name: Release Build (Multi-Platform)

# ============================================================================
# 多平台构建脚本
# 
# 与 KTM 本地构建脚本保持一致：
# - macOS: build-macos-universal.sh（aarch64 + x64 DMG）
# - Windows: build-windows.bat（便携版 + 安装版）
# - Linux: Dockerfile.build（DEB + RPM）
# 
# 渠道支持：
# - default 渠道：tag 格式 v0.2.8
# - goofish 渠道：tag 格式 goofish-v0.2.8
# 
# 集成保护措施：
# - 前端代码混淆（控制流扁平化、字符串加密、死代码注入）
# - Rust LTO 优化和符号剥离
# - 运行时反调试（ptrace、调试器检测、完整性检查）
# - 二进制加壳（符号剥离、垃圾数据注入、时间戳混淆）
# ============================================================================

on:
  push:
    tags:
      - 'v*'           # default 渠道
      - 'goofish-v*'   # goofish 渠道
  workflow_dispatch:
    inputs:
      channel:
        description: '构建渠道 (default/goofish)'
        required: false
        default: 'default'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            arch: 'x64'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            arch: 'aarch64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            arch: 'x64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            arch: 'amd64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libxdo-dev libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Determine channel and version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/goofish-v* ]]; then
            CHANNEL="goofish"
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#goofish-v}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            CHANNEL="default"
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            CHANNEL="${{ github.event.inputs.channel }}"
            CHANNEL="${CHANNEL:-default}"
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "CHANNEL=$CHANNEL" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Channel: $CHANNEL"
          echo "📌 Version: $VERSION"
          
          # 同步更新所有版本文件，确保关于页版本与 tag 一致
          npm pkg set version="$VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          
          echo "✅ 版本已同步到所有配置文件"

      - name: Build frontend
        env:
          CHANNEL: ${{ steps.version.outputs.CHANNEL }}
        run: npm run build

      - name: Bundle Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          CHANNEL: ${{ steps.version.outputs.CHANNEL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles dmg,app

      - name: Bundle Tauri app (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          CHANNEL: ${{ steps.version.outputs.CHANNEL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles deb,rpm,appimage

      - name: Bundle Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          CHANNEL: ${{ steps.version.outputs.CHANNEL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # 使用 tauri build 生成包含嵌入前端资源的可执行文件
          npm run tauri build -- --target ${{ matrix.target }} --bundles nsis

      - name: Install UPX (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $upxVersion = "4.2.4"
          $upxUrl = "https://github.com/upx/upx/releases/download/v${upxVersion}/upx-${upxVersion}-win64.zip"
          Invoke-WebRequest -Uri $upxUrl -OutFile "upx.zip"
          Expand-Archive -Path "upx.zip" -DestinationPath "upx-temp" -Force
          Move-Item "upx-temp/upx-${upxVersion}-win64/upx.exe" "upx.exe"
          Remove-Item "upx.zip"
          Remove-Item "upx-temp" -Recurse

      - name: Binary packing (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $binaryPath = "src-tauri/target/${{ matrix.target }}/release/kiro-token-manager.exe"
          if (Test-Path $binaryPath) {
            # UPX 压缩（tauri build 生成的 exe 可能无法压缩，忽略错误）
            ./upx.exe --best --lzma $binaryPath 2>$null
            # 添加垃圾数据混淆
            $junkData = New-Object byte[] 262144
            $rng = New-Object System.Security.Cryptography.RNGCryptoServiceProvider
            $rng.GetBytes($junkData)
            $fs = [System.IO.File]::Open($binaryPath, [System.IO.FileMode]::Append)
            $fs.Write($junkData, 0, $junkData.Length)
            $fs.Close()
            # 修改时间戳
            $fakeDate = Get-Date "2020-01-01 00:00:00"
            (Get-Item $binaryPath).CreationTime = $fakeDate
            (Get-Item $binaryPath).LastWriteTime = $fakeDate
          }

      - name: Create Windows portable packages
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $CHANNEL = "${{ steps.version.outputs.CHANNEL }}"
          $binaryPath = "src-tauri/target/${{ matrix.target }}/release/kiro-token-manager.exe"
          $PREFIX = if ($CHANNEL -eq "default") { "" } else { "${CHANNEL}_" }
          
          New-Item -ItemType Directory -Force -Path "portable"
          
          # 创建便携版（不含 WebView2）
          $portableDir = "portable/${PREFIX}KiroTokenManager_${VERSION}_x64_portable"
          New-Item -ItemType Directory -Force -Path $portableDir
          Copy-Item $binaryPath "$portableDir/KiroTokenManager.exe"
          New-Item -ItemType File -Path "$portableDir/.portable" -Force
          Compress-Archive -Path $portableDir -DestinationPath "portable/${PREFIX}KiroTokenManager_${VERSION}_x64_portable.zip"

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          VERSION=${{ steps.version.outputs.VERSION }}
          CHANNEL=${{ steps.version.outputs.CHANNEL }}
          TARGET=${{ matrix.target }}
          ARCH=${{ matrix.arch }}
          
          if [ "$CHANNEL" = "default" ]; then
            PREFIX=""
          else
            PREFIX="${CHANNEL}_"
          fi
          
          echo "📦 Channel: $CHANNEL, Version: $VERSION, Prefix: $PREFIX"
          
          # 调试：列出 bundle 目录结构
          echo "📂 Bundle 目录结构:"
          find src-tauri/target/${TARGET}/release/bundle -type f 2>/dev/null || echo "Bundle 目录不存在"
          
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            for f in portable/*.zip; do
              [ -f "$f" ] && cp "$f" "release/"
            done
            # 复制 NSIS 安装包
            for f in src-tauri/target/${TARGET}/release/bundle/nsis/*.exe; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}_setup.exe"
            done
            # 复制 updater 更新包和签名文件
            for f in src-tauri/target/${TARGET}/release/bundle/nsis/*.nsis.zip; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}_nsis.zip"
            done
            for f in src-tauri/target/${TARGET}/release/bundle/nsis/*.nsis.zip.sig; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}_nsis.zip.sig"
            done
          fi
          
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            for f in src-tauri/target/${TARGET}/release/bundle/dmg/*.dmg; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}.dmg"
            done
            # 复制 updater 更新包和签名文件（自动更新必需）
            for f in src-tauri/target/${TARGET}/release/bundle/macos/*.app.tar.gz; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}.app.tar.gz"
            done
            for f in src-tauri/target/${TARGET}/release/bundle/macos/*.app.tar.gz.sig; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}.app.tar.gz.sig"
            done
          fi
          
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            for f in src-tauri/target/${TARGET}/release/bundle/deb/*.deb; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}.deb"
            done
            for f in src-tauri/target/${TARGET}/release/bundle/rpm/*.rpm; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_x86_64.rpm"
            done
            # 复制 updater 更新包和签名文件（自动更新必需）
            for f in src-tauri/target/${TARGET}/release/bundle/appimage/*.AppImage.tar.gz; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}.AppImage.tar.gz"
            done
            for f in src-tauri/target/${TARGET}/release/bundle/appimage/*.AppImage.tar.gz.sig; do
              [ -f "$f" ] && cp "$f" "release/${PREFIX}KiroTokenManager_${VERSION}_${ARCH}.AppImage.tar.gz.sig"
            done
          fi
          
          # 不在这里生成 SHA256SUMS.txt，由汇总 job 统一生成
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.CHANNEL }}-${{ matrix.target }}
          path: release/*
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 生成 latest.json 和汇总 SHA256SUMS.txt
  generate-latest-json:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-default-*

      - name: Generate latest.json and SHA256SUMS.txt
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          REPO="usaalas/kiro-token-manager"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"
          
          # 读取签名文件
          read_sig() {
            local file="$1"
            if [ -f "$file" ]; then
              cat "$file"
            else
              echo ""
            fi
          }
          
          # 查找文件
          MACOS_AARCH64_SIG=$(find artifacts -name "*aarch64.app.tar.gz.sig" -type f | head -1)
          MACOS_X64_SIG=$(find artifacts -name "*x64.app.tar.gz.sig" -type f | head -1)
          WINDOWS_SIG=$(find artifacts -name "*nsis.zip.sig" -type f | head -1)
          LINUX_SIG=$(find artifacts -name "*AppImage.tar.gz.sig" -type f | head -1)
          
          # 生成 latest.json
          cat > latest.json << EOF
          {
            "version": "v${VERSION}",
            "notes": "Kiro Token Manager v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$(read_sig "$MACOS_AARCH64_SIG")",
                "url": "${BASE_URL}/KiroTokenManager_${VERSION}_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$(read_sig "$MACOS_X64_SIG")",
                "url": "${BASE_URL}/KiroTokenManager_${VERSION}_x64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "$(read_sig "$WINDOWS_SIG")",
                "url": "${BASE_URL}/KiroTokenManager_${VERSION}_x64_nsis.zip"
              },
              "linux-x86_64": {
                "signature": "$(read_sig "$LINUX_SIG")",
                "url": "${BASE_URL}/KiroTokenManager_${VERSION}_amd64.AppImage.tar.gz"
              }
            }
          }
          EOF
          
          echo "📄 latest.json:"
          cat latest.json
          
          # 汇总生成 SHA256SUMS.txt（排除签名文件和已有的 SHA256SUMS.txt）
          echo "📝 生成汇总 SHA256SUMS.txt..."
          find artifacts -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.zip" -o -name "*.app.tar.gz" -o -name "*.AppImage.tar.gz" -o -name "*.nsis.zip" \) ! -name "*.sig" | while read file; do
            # 只取文件名，不要路径
            filename=$(basename "$file")
            hash=$(sha256sum "$file" | cut -d' ' -f1)
            echo "$hash  $filename"
          done | sort -k2 > SHA256SUMS.txt
          
          echo "📄 SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      - name: Upload latest.json and SHA256SUMS.txt to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            latest.json
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}